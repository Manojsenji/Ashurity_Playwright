name: Playwright Tests with Allure

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      USERNAME: ${{ secrets.USERNAME }}
      PASSWORD: ${{ secrets.PASSWORD }}
      BASE_URL: ${{ secrets.BASE_URL }}
      LT_USERNAME: ${{ secrets.LT_USERNAME }}
      LT_ACCESS_KEY: ${{ secrets.LT_ACCESS_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Install Allure CLI
        run: npm install -g allure-commandline

      # Checkout previous gh-pages content
      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages
        continue-on-error: true

      # Restore history
      - name: Restore Allure History
        run: |
          if [ -d "gh-pages/history" ]; then
            mkdir -p allure-results/history
            cp -r gh-pages/history/* allure-results/history
          fi

      # Run tests
      - name: Run Playwright Tests
        run: npx playwright test

      # Fix URLs
      - name: Fix Allure History URLs
        run: |
          if [ -d "allure-results/history" ]; then
            sed -i 's|http://localhost|https://manojsenji.github.io/Ashurity_Playwright|g' allure-results/history/*.json || true
          fi

      # Generate report
      - name: Generate Allure Report
        run: |
          allure generate allure-results --clean -o allure-report

      # Prepare run history folder
      - name: Prepare Run Report
        run: |
          mkdir -p gh-pages/runs
          cp -r allure-report gh-pages/runs/run-${{ github.run_number }}

      # Copy latest report
      - name: Update Latest Report
        run: |
          rm -rf gh-pages/*
          cp -r allure-report/* gh-pages/
          mkdir -p gh-pages/runs
          cp -r allure-report gh-pages/runs/run-${{ github.run_number }}

      # Deploy
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./gh-pages