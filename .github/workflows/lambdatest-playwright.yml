name: Playwright Tests with Allure

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      USERNAME: ${{ secrets.USERNAME }}
      PASSWORD: ${{ secrets.PASSWORD }}
      BASE_URL: ${{ secrets.BASE_URL }}
      LT_USERNAME: ${{ secrets.LT_USERNAME }}
      LT_ACCESS_KEY: ${{ secrets.LT_ACCESS_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Install Allure CLI
        run: npm install -g allure-commandline

      # Checkout previous GitHub Pages content
      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages
        continue-on-error: true

      # Restore previous history
      - name: Restore Allure History
        run: |
          if [ -d "gh-pages/history" ]; then
            mkdir -p allure-results/history
            cp -r gh-pages/history/* allure-results/history
          fi

      # Run Playwright tests
      - name: Run Playwright Tests
        run: npx playwright test

      # Generate Allure report
      - name: Generate Allure Report
        run: |
          allure generate allure-results --clean -o allure-report

      # Fix localhost URLs AFTER report generation
      - name: Fix Report URLs
        run: |
          if [ -d "allure-report/history" ]; then
            sed -i 's|http://localhost|https://manojsenji.github.io/Ashurity_Playwright|g' allure-report/history/*.json || true
          fi

      # Preserve previous run reports
      - name: Preserve Previous Runs
        run: |
          mkdir -p gh-pages/runs

      # Save current run report
      - name: Save Current Run
        run: |
          cp -r allure-report gh-pages/runs/run-${{ github.run_number }}

      # Update latest report without deleting runs/history
      - name: Update Latest Report
        run: |
          cp -r allure-report/* gh-pages/

      # Deploy to GitHub Pages
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./gh-pages