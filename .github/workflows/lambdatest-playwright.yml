name: Playwright Tests with Allure

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      USERNAME: ${{ secrets.USERNAME }}
      PASSWORD: ${{ secrets.PASSWORD }}
      BASE_URL: ${{ secrets.BASE_URL }}
      LT_USERNAME: ${{ secrets.LT_USERNAME }}
      LT_ACCESS_KEY: ${{ secrets.LT_ACCESS_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Install Allure CLI
        run: npm install -g allure-commandline

      # Checkout gh-pages branch to restore history
      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages
        continue-on-error: true

      # Restore previous history
      - name: Restore Allure History
        run: |
          if [ -d "gh-pages/history" ]; then
            echo "Restoring history..."
            mkdir -p allure-results/history
            cp -r gh-pages/history/* allure-results/history
          else
            echo "No previous history found"
          fi

      - name: Run Playwright Tests
        run: npx playwright test

      # Fix localhost URLs in trend history
      - name: Fix Allure History URLs
        run: |
          if [ -f allure-results/history/history-trend.json ]; then
            sed -i 's|http://localhost|https://manojsenji.github.io/Ashurity_Playwright|g' allure-results/history/history-trend.json
          fi

      # Generate Allure report
      - name: Generate Allure Report
        if: always()
        run: |
          allure generate allure-results --clean -o allure-report

      # Save history for next build
      - name: Save history
        if: always()
        run: |
          mkdir -p allure-report/history
          if [ -d "allure-results/history" ]; then
            cp -r allure-results/history/* allure-report/history
          fi

      # Upload artifact
      - name: Upload Allure Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-report
          path: allure-report

      # Deploy report to GitHub Pages
      - name: Deploy Allure Report
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-report